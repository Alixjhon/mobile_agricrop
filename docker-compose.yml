version: '3.8'

services:
  # Frontend - Nginx serving React app
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cropwise-network

  # Backend - Node.js API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5001:5001"
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5001
    restart: unless-stopped
    networks:
      - cropwise-network
    volumes:
      - backend-uploads:/app/uploads

# Volumes for persistent data
volumes:
  backend-uploads:
    driver: local

# Network configuration
networks:
  cropwise-network:
    driver: bridge